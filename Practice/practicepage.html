<!doctype html>
<html lang="en">

<head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Practice</title>
</head>

<body>
        <h1>
                i DO my <font color="Teal"><u>Practice</u></font> here
        </h1>

        <p>A paragraph made by me to practice JavaScript</p>
        <p id="mark"></p>
        <p id="motivate"></p>
        <p id="pressureize"></p>
        
        <button onclick="window.location.reload()" style="padding: 5px; margin: 5px; border-radius: 1px">
                Refresh page
        </button>
        
        <button id="marksshowbtn" style="padding: 5px; margin: 5px; border-radius: 1px">
                Display Marks
        </button>
        <div id="marks" style="display: none">
                <input type="number" id="inputmarks" style="padding: 5px; margin: 5px; border-radius: 1px" >
                <button id="showmarks" style="padding: 5px; margin: 5px; border-radius: 1px">
                        Your Marks
                </button>
        </div>
        
        <button id="ageshowbtn" style="padding:5px; margin:5px; border-radius:1px;">Display Age</button>
        <div id="showage" style="display: none">
                
                <input type="number" id="inputage" style="padding:5px; margin:5px; border-radius:1px;">
                
                <button id="checkage" style="padding:5px; margin:5px; border-radius:1px;">Check Your age</button>
        </div>
        
        <button id="loginbtn" style="padding:5px; margin:5px; border-radius:1px;">Login</button>
        <div id="login" style="display: none;">
                
                <p><font size = "5" id="enterusername"><u>Enter Your Username</u></font></p>
                <input type="text" id="inputusername" style="padding:5px; margin:5px; border-radius:1px;">
                <button id="checkusername" style="padding:5px; margin:5px; border-radius:1px;"> Check Username</button>
                
        </div>
        <h1 id="status"></h1>
        
        <script src="practicescript.js"></script>
