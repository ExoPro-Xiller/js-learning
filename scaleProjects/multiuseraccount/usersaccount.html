<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="useraccount.css">
    <title>Account</title>
</head>
<body>
     <!--
    Button style = "padding:5px; margin:5px; border-radius:1px;"
    Input Style = "padding:5px; margin:5px; border-radius:1px;"
    -->

    <h1>A Multi-user Account  <font color = "Teal"><U>Concept</U></font></h1>
    <!-- Creating An account -->
        <div id="account" >
            <button id="createaccbtn" style = "padding:5px; margin:5px; border-radius:1px;" onclick="createaccounttoggle()">Create your account</button>

            <button id="loginbtn" style = "padding:5px; margin:5px; border-radius:1px;" onclick="logintoggle()">Log into Your Account</button>

            <button style = "padding:5px; margin:5px; border-radius:1px;" onclick="clearstorage()">Clear LocalStorage</button>

            <div id="createdashboard" style="display:none">

                <p class="para">Enter Your Name</p>
                <input id="userinput" type="text" style = "padding:5px; margin:5px; border-radius:1px;">

                <p class="para">Enter Your Email</p>
                <input id="emailinput" type = "text" style = "padding:5px; margin:5px; border-radius:1px;">
                
                <p class="para">Enter Your Password</p>
                <input id="passwordinput" style = "padding:5px; margin:5px; border-radius:1px;">
                
                <p class="para">Confirm Password</p>
                <input id="confpassword" style = "padding:5px; margin:5px; border-radius:1px;">
                
                <button id="create_process" style = "padding:5px; margin:5px; border-radius:1px;" onclick="createaccount()">Create Account</button>
            </div>
            
            <div id ="logindashboard" style="display: none;">
                <p>Enter Your Name OR Email</p>
                <input id="emailuserlogin" type ="text" style = "padding:5px; margin:5px; border-radius:1px;">
    
                <p>Enter Your Password</p>
                <input id="passwordlogin" style = "padding:5px; margin:5px; border-radius:1px;">
                <button id="login" onclick="loginaccount()">Login</button>
                
            </div>
        </div>
        <div id="dashboard" style="display:none;">
            <button id="showinfo" style = "padding:5px; margin:5px; border-radius:1px;" > Show User Information</button>
            <div id="info" style="display: none;"></div>
            <button id="logout" style = "padding:5px; margin:5px; border-radius:1px;" onclick="log_out()">Log Out</button>
        </div>
    
        <script src="usersaccount.js"></script>
</body>
</html>
